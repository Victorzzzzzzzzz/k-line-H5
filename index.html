<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinW 极速挑战 - 稳定版</title>
    <style>
        :root { --up: #00c087; --down: #ff3b5b; --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: manipulation; }
        #app { height: 100vh; display: flex; flex-direction: column; padding: 12px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-live { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; }
        #chart-wrap { flex: 1; position: relative; margin-bottom: 10px; }
        canvas { width: 100% !important; height: 100% !important; }
        .controls { padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .lev-selector { display: flex; gap: 6px; margin-bottom: 12px; }
        .lev-btn { flex: 1; background: #2b3139; border: 1px solid transparent; color: #848e9c; padding: 10px 0; border-radius: 4px; font-size: 12px; }
        .lev-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,185,11,0.1); }
        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 50px; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; }
        .btn-up { background: var(--up); }
        .btn-down { background: var(--down); }
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; align-items: center; justify-content: center; }
        .win-box { background: var(--panel); width: 80%; padding: 30px; border-radius: 16px; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div>
            <div style="color: #848e9c; font-size: 12px;">BTC/USDT 永续 (1m)</div>
            <div id="price-val" class="price-live">加载中...</div>
        </div>
        <div style="text-align: right;">
            <div style="color: #848e9c; font-size: 11px;">模拟余额</div>
            <div style="font-size: 16px; font-weight: 700;">10,000.00 <span style="font-size:10px; color:var(--gold)">USDT</span></div>
        </div>
    </div>

    <div id="chart-wrap">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <div class="lev-selector">
            <button class="lev-btn" onclick="setLev(this, 50)">50x</button>
            <button class="lev-btn active" onclick="setLev(this, 100)">100x</button>
            <button class="lev-btn" onclick="setLev(this, 125)">125x</button>
        </div>
        <div class="trade-btns">
            <button class="btn btn-up" onclick="executeTrade('up')">买入/看涨</button>
            <button class="btn btn-down" onclick="executeTrade('down')">卖出/看跌</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="win-box">
        <div style="color: #848e9c; font-size: 14px;">盈利结算</div>
        <div id="pnl-display" style="font-size: 48px; font-weight: bold; color: var(--up); margin: 10px 0;">+0.00%</div>
        <button class="btn btn-up" style="width: 100%; border-radius: 25px;" onclick="location.reload()">继续挑战</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    let candles = [];
    let lastPrice = 0;
    let isUserTrading = false;
    let leverage = 100;
    const MAX_VISIBLE = 60; // 显示60根K线，代表1小时左右的视觉范围

    async function init() {
        // 1. 适配高清屏
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // 2. 获取过去3小时的历史真实数据 (使用币安公共API)
        // interval=1m (1分钟线), limit=80 (获取80个点)
        try {
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=80');
            const data = await response.json();
            candles = data.map(d => ({
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4])
            }));
            lastPrice = candles[candles.length - 1].close;
        } catch (e) {
            // 如果API报错，生成一组假数据兜底
            console.error("API获取失败，切换至演示模式");
            generateFallbackData();
        }

        render();
        // 启动模拟波动逻辑，每秒更新一次，不再依赖网络推送
        setInterval(simulateTicker, 1000);
    }

    function generateFallbackData() {
        let base = 68000;
        for(let i=0; i<80; i++) {
            let o = base + (Math.random()-0.5)*40;
            let c = o + (Math.random()-0.5)*40;
            candles.push({open: o, close: c, high: Math.max(o,c)+10, low: Math.min(o,c)-10});
            base = c;
        }
        lastPrice = base;
    }

    function simulateTicker() {
        // 模拟价格微小波动 (+- 5刀)
        let drift = (Math.random() - 0.5) * 10;
        
        // 如果用户在交易，强制让价格往用户选的方向走，确保“必赢”体验
        if(isUserTrading) {
            drift = (window._dir === 'up' ? 5 : -5) + (Math.random()*5);
        }

        lastPrice += drift;
        document.getElementById('price-val').innerText = lastPrice.toFixed(2);
        
        let lastC = candles[candles.length - 1];
        lastC.close = lastPrice;
        lastC.high = Math.max(lastC.high, lastPrice);
        lastC.low = Math.min(lastC.low, lastPrice);

        // 每30秒产生一根新K线，防止K线移动过快看起来不自然
        if (Date.now() % 30000 < 1000) {
            candles.shift();
            candles.push({open: lastPrice, close: lastPrice, high: lastPrice, low: lastPrice});
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;

        // 获取当前显示的K线范围
        const visibleCandles = candles.slice(-MAX_VISIBLE);
        const maxP = Math.max(...visibleCandles.map(c => c.high));
        const minP = Math.min(...visibleCandles.map(c => c.low));
        const diff = maxP - minP;
        
        // 核心：纵坐标保持20%的上下留白，防止K线撑满屏幕
        const viewMax = maxP + diff * 0.2;
        const viewMin = minP - diff * 0.2;
        
        const getY = (p) => h - ((p - viewMin) / (viewMax - viewMin)) * h;
        const cW = w / MAX_VISIBLE;

        // 绘制辅助网格
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        for(let i=1; i<5; i++) {
            let gy = (h/5)*i;
            ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
        }

        visibleCandles.forEach((c, i) => {
            const x = i * cW;
            const yO = getY(c.open);
            const yC = getY(c.close);
            const color = c.close >= c.open ? "#00c087" : "#ff3b5b";
            
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.lineWidth = 1;
            // 影线
            ctx.beginPath();
            ctx.moveTo(x + cW/2, getY(c.high));
            ctx.lineTo(x + cW/2, getY(c.low));
            ctx.stroke();
            // 实体 (增加圆角或间距，看起来更精致)
            ctx.fillRect(x + 2, Math.min(yO, yC), cW - 4, Math.max(Math.abs(yO - yC), 1));
        });

        // 绘制现价线
        const curY = getY(lastPrice);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(0, curY); ctx.lineTo(w, curY); ctx.stroke();
        ctx.setLineDash([]);

        requestAnimationFrame(render);
    }

    function setLev(btn, val) {
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        leverage = val;
    }

    function executeTrade(dir) {
        if(isUserTrading) return;
        isUserTrading = true;
        window._dir = dir;
        // 模拟5秒后获利
        setTimeout(() => {
            const pnl = (Math.random() * 5 + 5) * leverage;
            document.getElementById('pnl-display').innerText = `+${pnl.toFixed(2)}%`;
            document.getElementById('result-modal').style.display = 'flex';
        }, 5000);
    }

    window.onload = init;
</script>
</body>
</html>
