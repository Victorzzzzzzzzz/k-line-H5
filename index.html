<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinW K线大师</title>
    <style>
        :root { --up: #00c087; --down: #ff3b5b; --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: manipulation; }
        
        /* 引导遮罩层 */
        #guide-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.4s; }
        .guide-card { background: var(--panel); width: 85%; max-width: 350px; padding: 30px 20px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .guide-title { color: var(--gold); font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        .guide-desc { color: #848e9c; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .feature-tag { display: inline-block; background: rgba(240,185,11,0.1); color: var(--gold); padding: 4px 12px; border-radius: 4px; font-size: 12px; margin: 5px; }

        #app { height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-live { font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; margin: 5px 0; }
        
        #chart-wrap { flex: 1; position: relative; width: 100%; border-radius: 8px; background: rgba(255,255,255,0.02); }
        canvas { width: 100% !important; height: 100% !important; }

        .controls { padding-top: 15px; }
        .lev-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .lev-btn { flex: 1; background: #2b3139; border: 1px solid transparent; color: #848e9c; padding: 10px 0; border-radius: 4px; font-size: 12px; transition: 0.2s; }
        .lev-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,185,11,0.1); }
        
        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 10px; }
        .btn { height: 55px; border: none; border-radius: 8px; color: #fff; font-size: 18px; font-weight: bold; transition: transform 0.1s; cursor: pointer; }
        .btn-up { background: var(--up); box-shadow: 0 4px 15px rgba(0,192,135,0.3); }
        .btn-down { background: var(--down); box-shadow: 0 4px 15px rgba(255,59,91,0.3); }
        .btn:active { transform: scale(0.95); }
        
        /* 结算弹窗 */
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .win-box { background: var(--panel); width: 85%; max-width: 320px; padding: 40px 20px; border-radius: 24px; text-align: center; border: 1px solid var(--gold); position: relative; }
        .pnl-percent { font-size: 56px; font-weight: bold; color: var(--up); margin: 10px 0; text-shadow: 0 0 20px rgba(0,192,135,0.4); }
        
        /* 最终跳转按钮 */
        .cta-btn { background: var(--gold); color: #000; display: block; padding: 18px; border-radius: 35px; text-decoration: none; font-weight: bold; margin-top: 25px; font-size: 18px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(240,185,11,0.7); } 70% { box-shadow: 0 0 0 15px rgba(240,185,11,0); } 100% { box-shadow: 0 0 0 0 rgba(240,185,11,0); } }
    </style>
</head>
<body>

<!-- 第一页：说明引导 -->
<div id="guide-overlay">
    <div class="guide-card">
        <div class="guide-title">CoinW K线大师</div>
        <div class="guide-desc">
            体验 60 秒极速收割行情<br>
            预测 BTC 走势，赢取实盘赠金
        </div>
        <div>
            <span class="feature-tag">125x 杠杆</span>
            <span class="feature-tag">秒级结算</span>
            <span class="feature-tag">零门槛体验</span>
        </div>
        <button class="cta-btn" style="width: 100%; border:none;" onclick="startPlay()">立即开始挑战</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div>
            <div style="color: #848e9c; font-size: 12px;">BTC/USDT 永续 · 1m</div>
            <div id="price-val" class="price-live">加载中...</div>
        </div>
        <div style="text-align: right;">
            <div style="color: #848e9c; font-size: 12px;">体验金余额</div>
            <div style="font-size: 18px; font-weight: bold;">10,000.00 <span style="font-size:12px; color:var(--gold)">USDT</span></div>
        </div>
    </div>

    <div id="chart-wrap">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <div class="lev-selector">
            <button class="lev-btn" onclick="setLev(this, 50)">50x</button>
            <button class="lev-btn active" onclick="setLev(this, 100)">100x</button>
            <button class="lev-btn" onclick="setLev(this, 125)">125x</button>
        </div>
        <div class="trade-btns">
            <button class="btn btn-up" onclick="executeTrade('up')">买入看涨</button>
            <button class="btn btn-down" onclick="executeTrade('down')">卖出看跌</button>
        </div>
    </div>
</div>

<!-- 结果页：点击跳转 CoinW -->
<div id="result-modal">
    <div class="win-box">
        <div style="color: #848e9c; font-size: 14px;">预测成功 (杠杆 x<span id="res-lev">100</span>)</div>
        <div id="pnl-display" class="pnl-percent">+0.00%</div>
        <div style="color: #fff; font-size: 15px; opacity: 0.8;">奖励已就绪，请前往实盘账户查收</div>
        <a href="https://www.coinw.com" class="cta-btn">前往领取我的奖励</a>
        <p style="font-size: 11px; color: #848e9c; margin-top: 15px;">* 仅限通过此活动页注册的用户</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    let candles = [];
    let lastPrice = 0;
    let isUserTrading = false;
    let leverage = 100;
    const MAX_VISIBLE = 60; // 固定展示过去1小时数据
    let orderPrice = null;

    async function init() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // 获取过去1小时真实K线
        try {
            const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=60');
            const data = await res.json();
            candles = data.map(d => ({
                open: parseFloat(d[1]), high: parseFloat(d[2]), 
                low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            lastPrice = candles[candles.length - 1].close;
        } catch (e) {
            generateFakeData();
        }

        setInterval(localHighFreqSim, 100); 
        render();
    }

    function generateFakeData() {
        let base = 68000;
        for(let i=0; i<MAX_VISIBLE; i++) {
            let o = base + (Math.random()-0.5)*30;
            let c = o + (Math.random()-0.5)*30;
            candles.push({open: o, close: c, high: Math.max(o,c)+10, low: Math.min(o,c)-10});
            base = c;
        }
        lastPrice = base;
    }

    function localHighFreqSim() {
        let drift = (Math.random() - 0.5) * 8;
        if(isUserTrading) {
            // 确保盈利方向：买涨则价格上漂，买跌则下漂
            drift = (window._dir === 'up' ? 3 : -3) + (Math.random()-0.5)*6;
        }
        lastPrice += drift;
        
        const priceEl = document.getElementById('price-val');
        priceEl.innerText = lastPrice.toFixed(2);
        priceEl.style.color = drift >= 0 ? "var(--up)" : "var(--down)";

        let lastC = candles[candles.length - 1];
        lastC.close = lastPrice;
        lastC.high = Math.max(lastC.high, lastPrice);
        lastC.low = Math.min(lastC.low, lastPrice);

        if (Math.random() > 0.99) {
            candles.shift();
            candles.push({open: lastPrice, close: lastPrice, high: lastPrice, low: lastPrice});
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        const cW = w / MAX_VISIBLE;

        const highP = Math.max(...candles.map(c => c.high));
        const lowP = Math.min(...candles.map(c => c.low));
        const diff = (highP - lowP) || 100;
        const viewMax = highP + diff * 0.25;
        const viewMin = lowP - diff * 0.25;
        const getY = (p) => h - ((p - viewMin) / (viewMax - viewMin)) * h;

        // K线绘制
        candles.forEach((c, i) => {
            const x = i * cW;
            const y_o = getY(c.open);
            const y_c = getY(c.close);
            const color = c.close >= c.open ? "#00c087" : "#ff3b5b";
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + cW/2, getY(c.high));
            ctx.lineTo(x + cW/2, getY(c.low));
            ctx.stroke();
            ctx.fillRect(x + 2, Math.min(y_o, y_c), cW - 4, Math.max(Math.abs(y_o - y_c), 1.5));
        });

        // 下单基准线
        if(isUserTrading && orderPrice) {
            const oy = getY(orderPrice);
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.stroke();
            ctx.fillStyle = "#fff";
            ctx.font = "10px sans-serif";
            ctx.fillText("我的持仓价", 10, oy - 5);
        }

        // 现价虚线
        const lastY = getY(lastPrice);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(0, lastY); ctx.lineTo(w, lastY); ctx.stroke();
        ctx.setLineDash([]);

        requestAnimationFrame(render);
    }

    function startPlay() {
        document.getElementById('guide-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('guide-overlay').style.display = 'none', 400);
    }

    function setLev(btn, val) {
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        leverage = val;
    }

    function executeTrade(dir) {
        if(isUserTrading) return;
        isUserTrading = true;
        window._dir = dir;
        orderPrice = lastPrice;

        // 4秒结算动画（K线大师）
        setTimeout(() => {
            const pnl = (Math.random() * 5 + 10) * leverage; // 增加盈利百分比视觉冲击力
            document.getElementById('res-lev').innerText = leverage;
            document.getElementById('pnl-display').innerText = `+${pnl.toFixed(2)}%`;
            document.getElementById('result-modal').style.display = 'flex';
        }, 4000);
    }

    window.onload = init;
</script>
</body>
</html>
