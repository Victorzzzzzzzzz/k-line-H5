<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinW 极速挑战 - 稳定版</title>
    <style>
        :root { --up: #00c087; --down: #ff3b5b; --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: manipulation; }
        
        #guide-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.4s; }
        .guide-card { background: var(--panel); width: 85%; max-width: 350px; padding: 25px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; }

        #app { height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-live { font-family: 'Courier New', monospace; font-size: 30px; font-weight: bold; margin: 5px 0; }
        
        #chart-wrap { flex: 1; position: relative; width: 100%; }
        canvas { width: 100% !important; height: 100% !important; }

        .controls { padding-top: 15px; }
        .lev-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .lev-btn { flex: 1; background: #2b3139; border: 1px solid transparent; color: #848e9c; padding: 10px 0; border-radius: 4px; font-size: 12px; }
        .lev-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,185,11,0.1); }
        
        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 10px; }
        .btn { height: 50px; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; position: relative; overflow: hidden; }
        .btn-up { background: var(--up); }
        .btn-down { background: var(--down); }
        
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .win-box { background: var(--panel); width: 85%; max-width: 320px; padding: 40px 20px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); }
        .pnl-percent { font-size: 52px; font-weight: bold; color: var(--up); margin: 10px 0; }
        .cta-btn { background: var(--gold); color: #000; display: block; padding: 16px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 25px; }
        
        .order-line { position: absolute; left: 0; width: 100%; height: 1px; border-top: 1px dashed #fff; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="guide-overlay" onclick="startPlay()">
    <div class="guide-card">
        <h2 style="color: var(--gold); margin: 0 0 15px 0;">BTC 1小时挑战</h2>
        <p style="font-size: 14px; color: #848e9c;">观察过去 1 小时行情走势<br>预测未来 60 秒波动</p>
        <button class="cta-btn" style="width: 100%; margin-top: 10px;">开始体验</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div>
            <div style="color: #848e9c; font-size: 12px;">BTC/USDT 永续 (1m)</div>
            <div id="price-val" class="price-live">加载中...</div>
        </div>
        <div style="text-align: right;">
            <div style="color: #848e9c; font-size: 12px;">模拟余额</div>
            <div style="font-size: 18px; font-weight: bold;">10,000.00 <span style="font-size:12px; color:var(--gold)">USDT</span></div>
        </div>
    </div>

    <div id="chart-wrap">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <div class="lev-selector">
            <button class="lev-btn" onclick="setLev(this, 50)">50x</button>
            <button class="lev-btn active" onclick="setLev(this, 100)">100x</button>
            <button class="lev-btn" onclick="setLev(this, 125)">125x</button>
        </div>
        <div class="trade-btns">
            <button class="btn btn-up" onclick="executeTrade(this, 'up')">买入/看涨</button>
            <button class="btn btn-down" onclick="executeTrade(this, 'down')">卖出/看跌</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="win-box">
        <div style="color: #848e9c; font-size: 14px;">盈利结算 (x<span id="res-lev">100</span>)</div>
        <div id="pnl-display" class="pnl-percent">+0.00%</div>
        <div style="color: #fff; font-size: 15px;">恭喜！已发放到模拟账户</div>
        <a href="#" class="cta-btn" onclick="location.reload()">再次挑战</a>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    let candles = [];
    let lastPrice = 0;
    let isUserTrading = false;
    let leverage = 100;
    const MAX_VISIBLE = 60; // 固定展示过去1小时（60根1分钟线）
    let orderPrice = null;

    async function init() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // 核心修改：从 REST API 获取过去 1 小时的真实 1m K线
        try {
            const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=60');
            const data = await res.json();
            candles = data.map(d => ({
                open: parseFloat(d[1]), high: parseFloat(d[2]), 
                low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            lastPrice = candles[candles.length - 1].close;
        } catch (e) {
            // 备选方案：如果API失败，生成伪造数据
            let base = 65000;
            for(let i=0; i<MAX_VISIBLE; i++) {
                let open = base + (Math.random()-0.5)*40;
                let close = open + (Math.random()-0.5)*40;
                candles.push({open, close, high: Math.max(open, close)+10, low: Math.min(open, close)-10});
                base = close;
            }
            lastPrice = base;
        }

        // 启动本地高频模拟，不再依赖 WebSocket 保持更新
        setInterval(localSim, 100); 
        render();
    }

    function localSim() {
        // 模拟价格微弱跳动 (100ms跳一次)
        let drift = (Math.random() - 0.5) * 6;
        
        // 交易中的操控逻辑：让价格往用户选的方向走
        if(isUserTrading) {
            drift = (window._dir === 'up' ? 2 : -2) + (Math.random()-0.5)*5;
        }

        lastPrice += drift;
        
        // 更新UI
        const el = document.getElementById('price-val');
        el.innerText = lastPrice.toFixed(2);
        el.style.color = drift >= 0 ? "var(--up)" : "var(--down)";

        // 更新当前 K 线
        let lastC = candles[candles.length - 1];
        lastC.close = lastPrice;
        lastC.high = Math.max(lastC.high, lastPrice);
        lastC.low = Math.min(lastC.low, lastPrice);

        // 模拟K线滚动：约每 60 秒生成新柱体
        if (Math.random() > 0.998) {
            candles.shift();
            candles.push({open: lastPrice, close: lastPrice, high: lastPrice, low: lastPrice});
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        const cW = w / MAX_VISIBLE;

        // 计算纵坐标区间：增加 25% 的上下缓冲空间，防止K线顶天立地
        const highP = Math.max(...candles.map(c => c.high));
        const lowP = Math.min(...candles.map(c => c.low));
        const diff = (highP - lowP) || 100;
        const viewMax = highP + diff * 0.25;
        const viewMin = lowP - diff * 0.25;

        const getY = (p) => h - ((p - viewMin) / (viewMax - viewMin)) * h;

        // 绘制 K 线
        candles.forEach((c, i) => {
            const x = i * cW;
            const y_o = getY(c.open);
            const y_c = getY(c.close);
            const color = c.close >= c.open ? "#00c087" : "#ff3b5b";
            
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + cW/2, getY(c.high));
            ctx.lineTo(x + cW/2, getY(c.low));
            ctx.stroke();
            ctx.fillRect(x + 1.5, Math.min(y_o, y_c), cW - 3, Math.max(Math.abs(y_o - y_c), 1));
        });

        // 绘制下单成本线
        if(isUserTrading && orderPrice) {
            const oy = getY(orderPrice);
            ctx.setLineDash([2, 2]);
            ctx.strokeStyle = "#fff";
            ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.stroke();
            ctx.setLineDash([]);
        }

        // 绘制实时线
        const lastY = getY(lastPrice);
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.moveTo(0, lastY); ctx.lineTo(w, lastY); ctx.stroke();
        ctx.setLineDash([]);

        requestAnimationFrame(render);
    }

    function startPlay() {
        document.getElementById('guide-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('guide-overlay').style.display = 'none', 400);
    }

    function setLev(btn, val) {
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        leverage = val;
    }

    function executeTrade(btn, dir) {
        if(isUserTrading) return;
        isUserTrading = true;
        window._dir = dir;
        orderPrice = lastPrice;

        // 增加按钮点击反馈
        btn.style.transform = "scale(0.9)";
        setTimeout(() => btn.style.transform = "scale(1)", 100);

        setTimeout(() => {
            const pnl = (Math.random() * 5 + 6) * leverage;
            document.getElementById('res-lev').innerText = leverage;
            document.getElementById('pnl-display').innerText = `+${pnl.toFixed(2)}%`;
            document.getElementById('result-modal').style.display = 'flex';
        }, 4000);
    }

    window.onload = init;
</script>
</body>
</html>
