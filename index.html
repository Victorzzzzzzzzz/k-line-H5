<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinW 极速挑战 - 高频模拟版</title>
    <style>
        :root { --up: #00c087; --down: #ff3b5b; --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: manipulation; }
        #app { height: 100vh; display: flex; flex-direction: column; padding: 12px; box-sizing: border-box; }
        
        /* 顶部信息 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-live { font-family: 'Courier New', monospace; font-size: 30px; font-weight: bold; transition: color 0.1s; }
        
        /* 图表容器 */
        #chart-wrap { flex: 1; position: relative; margin-bottom: 10px; overflow: hidden; }
        canvas { width: 100% !important; height: 100% !important; }

        /* 操作区 */
        .controls { padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .lev-selector { display: flex; gap: 6px; margin-bottom: 15px; }
        .lev-btn { flex: 1; background: #2b3139; border: 1px solid transparent; color: #848e9c; padding: 10px 0; border-radius: 4px; font-size: 12px; }
        .lev-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,185,11,0.1); }
        
        /* 按钮动画 */
        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { height: 52px; border: none; border-radius: 8px; color: #fff; font-size: 17px; font-weight: bold; position: relative; overflow: hidden; transition: transform 0.1s; }
        .btn:active { transform: scale(0.92); }
        .btn-up { background: var(--up); box-shadow: 0 4px 15px rgba(0,192,135,0.2); }
        .btn-down { background: var(--down); box-shadow: 0 4px 15px rgba(255,59,91,0.2); }
        
        /* 点击波纹 */
        .ripple { position: absolute; background: rgba(255,255,255,0.3); border-radius: 50%; transform: scale(0); animation: ripple-ani 0.6s linear; pointer-events: none; }
        @keyframes ripple-ani { to { transform: scale(4); opacity: 0; } }

        /* 结算弹窗 */
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .win-box { background: var(--panel); width: 80%; padding: 40px 20px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); animation: pop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div>
            <div style="color: #848e9c; font-size: 12px;">BTC/USDT 永续 <span style="color:var(--up)">● Live</span></div>
            <div id="price-val" class="price-live">---</div>
        </div>
        <div style="text-align: right;">
            <div style="color: #848e9c; font-size: 11px;">模拟账户余额</div>
            <div style="font-size: 18px; font-weight: 700;">10,000.00 <span style="font-size:10px; color:var(--gold)">USDT</span></div>
        </div>
    </div>

    <div id="chart-wrap">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <div class="lev-selector">
            <button class="lev-btn" onclick="setLev(this, 50)">50x</button>
            <button class="lev-btn active" onclick="setLev(this, 100)">100x</button>
            <button class="lev-btn" onclick="setLev(this, 125)">125x</button>
        </div>
        <div class="trade-btns">
            <button class="btn btn-up" onclick="executeTrade(this, 'up')">买入/看涨</button>
            <button class="btn btn-down" onclick="executeTrade(this, 'down')">卖出/看跌</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="win-box">
        <div style="color: #848e9c; font-size: 14px;">挑战成功 (高倍杠杆)</div>
        <div id="pnl-display" style="font-size: 54px; font-weight: bold; color: var(--up); margin: 15px 0; text-shadow: 0 0 20px rgba(0,192,135,0.4);">+0.00%</div>
        <button class="btn btn-up" style="width: 80%; border-radius: 30px; margin-top: 10px;" onclick="location.reload()">领取赠金</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    let candles = [];
    let lastPrice = 0;
    let orderPrice = null; // 记录下单时的价格
    let isUserTrading = false;
    let leverage = 100;
    const MAX_VISIBLE = 55;

    async function init() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // 获取历史数据
        try {
            const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=80');
            const data = await response.json();
            candles = data.map(d => ({
                open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            lastPrice = candles[candles.length - 1].close;
        } catch (e) {
            generateFallbackData();
        }

        renderLoop();
        // 关键点1：将模拟频率改为 100ms (秒级跳动效果)
        setInterval(highFrequencySim, 100);
    }

    function generateFallbackData() {
        let base = 65000;
        for(let i=0; i<80; i++) {
            let o = base + (Math.random()-0.5)*30;
            let c = o + (Math.random()-0.5)*30;
            candles.push({open: o, close: c, high: Math.max(o,c)+10, low: Math.min(o,c)-10});
            base = c;
        }
        lastPrice = base;
    }

    function highFrequencySim() {
        // 每100ms产生一个极小的随机震荡 (0.5 - 3刀)
        let volatility = (Math.random() - 0.5) * 6;
        
        // 获胜算法逻辑
        if(isUserTrading) {
            volatility = (window._dir === 'up' ? 1.5 : -1.5) + (Math.random() - 0.5) * 4;
        }

        lastPrice += volatility;
        
        // 更新UI价格颜色
        const el = document.getElementById('price-val');
        el.innerText = lastPrice.toFixed(2);
        el.style.color = volatility >= 0 ? "var(--up)" : "var(--down)";

        let lastC = candles[candles.length - 1];
        lastC.close = lastPrice;
        lastC.high = Math.max(lastC.high, lastPrice);
        lastC.low = Math.min(lastC.low, lastPrice);

        // 每隔 200 个跳动周期产生新K线 (模拟大约20秒一根)
        if (Math.random() > 0.985) {
            candles.shift();
            candles.push({open: lastPrice, close: lastPrice, high: lastPrice, low: lastPrice});
        }
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;

        const visibleCandles = candles.slice(-MAX_VISIBLE);
        const maxP = Math.max(...visibleCandles.map(c => c.high));
        const minP = Math.min(...visibleCandles.map(c => c.low));
        const diff = Math.max(maxP - minP, 30);
        
        const viewMax = maxP + diff * 0.25;
        const viewMin = minP - diff * 0.25;
        const getY = (p) => h - ((p - viewMin) / (viewMax - viewMin)) * h;
        const cW = w / MAX_VISIBLE;

        // 绘制背景网格
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.setLineDash([]);
        for(let i=1; i<6; i++) {
            let gy = (h/6)*i;
            ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
        }

        // 绘制 K 线
        visibleCandles.forEach((c, i) => {
            const x = i * cW;
            const yO = getY(c.open);
            const yC = getY(c.close);
            const color = c.close >= c.open ? "#00c087" : "#ff3b5b";
            ctx.strokeStyle = ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + cW/2, getY(c.high));
            ctx.lineTo(x + cW/2, getY(c.low));
            ctx.stroke();
            ctx.fillRect(x + 1.5, Math.min(yO, yC), cW - 3, Math.max(Math.abs(yO - yC), 1));
        });

        // 绘制下单持仓线 (关键点2：补上动画效果的视觉反馈)
        if(isUserTrading && orderPrice) {
            const oY = getY(orderPrice);
            ctx.setLineDash([2, 2]);
            ctx.strokeStyle = window._dir === 'up' ? "rgba(0,192,135,0.8)" : "rgba(255,59,91,0.8)";
            ctx.beginPath(); ctx.moveTo(0, oY); ctx.lineTo(w, oY); ctx.stroke();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "10px sans-serif";
            ctx.fillText(`已买入 (${window._dir === 'up' ? '看涨' : '看跌'})`, 10, oY - 5);
        }

        // 绘制实时价格线
        const curY = getY(lastPrice);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.moveTo(0, curY); ctx.lineTo(w, curY); ctx.stroke();
        
        requestAnimationFrame(renderLoop);
    }

    function setLev(btn, val) {
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        leverage = val;
    }

    // 补上点击动画和下单锁定逻辑
    function executeTrade(btn, dir) {
        if(isUserTrading) return;
        
        // 1. 按钮点击波纹效果
        const circle = document.createElement("span");
        circle.classList.add("ripple");
        btn.appendChild(circle);
        setTimeout(() => circle.remove(), 600);

        // 2. 状态锁定
        isUserTrading = true;
        window._dir = dir;
        orderPrice = lastPrice; // 锁定下单价格

        // 3. 5秒倒计时结算
        setTimeout(() => {
            const finalPnl = (Math.random() * 5 + 8) * leverage;
            document.getElementById('pnl-display').innerText = `+${finalPnl.toFixed(2)}%`;
            document.getElementById('result-modal').style.display = 'flex';
        }, 4500);
    }

    window.onload = init;
</script>
</body>
</html>
