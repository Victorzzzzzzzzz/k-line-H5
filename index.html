<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinW 极速挑战 Pro</title>
    <style>
        :root { --up: #00c087; --down: #ff3b5b; --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; --grid: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: manipulation; }
        
        #app { height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .price-live { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; }
        
        #chart-wrap { flex: 1; position: relative; width: 100%; margin: 10px 0; border-top: 1px solid var(--grid); border-bottom: 1px solid var(--grid); }
        canvas { width: 100% !important; height: 100% !important; }

        .controls { padding-bottom: env(safe-area-inset-bottom); }
        .lev-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .lev-btn { flex: 1; background: #2b3139; border: 1px solid transparent; color: #848e9c; padding: 10px 0; border-radius: 4px; font-size: 12px; }
        .lev-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,185,11,0.1); }
        
        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { height: 50px; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; }
        .btn-up { background: var(--up); }
        .btn-down { background: var(--down); }
        
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .win-box { background: var(--panel); width: 80%; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .pnl-percent { font-size: 48px; font-weight: bold; color: var(--up); margin: 10px 0; }
        .cta-btn { background: var(--gold); color: #000; display: block; padding: 14px; border-radius: 25px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div>
            <div style="color: #848e9c; font-size: 12px;">BTC/USDT 永续</div>
            <div id="price-val" class="price-live">0.00</div>
        </div>
        <div style="text-align: right;">
            <div style="color: #848e9c; font-size: 12px;">账户余额</div>
            <div style="font-size: 16px; font-weight: bold;">10,000.00 <span style="font-size:10px; color:var(--gold)">USDT</span></div>
        </div>
    </div>

    <div id="chart-wrap">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="controls">
        <div class="lev-selector">
            <button class="lev-btn" onclick="setLev(this, 20)">20x</button>
            <button class="lev-btn" onclick="setLev(this, 50)">50x</button>
            <button class="lev-btn active" onclick="setLev(this, 100)">100x</button>
            <button class="lev-btn" onclick="setLev(this, 125)">125x</button>
        </div>
        <div class="trade-btns">
            <button class="btn btn-up" onclick="executeTrade('up')">买入/看涨</button>
            <button class="btn btn-down" onclick="executeTrade('down')">卖出/看跌</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="win-box">
        <div style="color: #848e9c; font-size: 14px;">挑战成功</div>
        <div id="pnl-display" class="pnl-percent">+0.00%</div>
        <a href="#" class="cta-btn" onclick="location.reload()">再次挑战</a>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    let candles = [];
    let lastPrice = 0;
    let isLive = false;
    let isUserTrading = false;
    let leverage = 100;
    const MAX_VISIBLE = 50; // 增加显示数量，让K线看起来更细长专业

    function init() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // 初始化伪造一些平稳数据
        let base = 66000;
        for(let i=0; i<MAX_VISIBLE; i++) {
            let o = base + (Math.random()-0.5)*20;
            let c = o + (Math.random()-0.5)*20;
            candles.push({open: o, close: c, high: Math.max(o,c)+5, low: Math.min(o,c)-5});
            base = c;
        }
        lastPrice = base;

        connectWS();
        render();
    }

    function connectWS() {
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const price = parseFloat(data.c);
            isLive = true;
            if(!isUserTrading) updateLogic(price);
        };
        ws.onclose = () => setTimeout(connectWS, 2000);
    }

    function updateLogic(price) {
        lastPrice = price;
        document.getElementById('price-val').innerText = price.toFixed(2);
        
        let lastC = candles[candles.length - 1];
        // 模拟步进逻辑：每隔几次数据生成新K线
        if (Math.random() > 0.92) {
            candles.shift();
            candles.push({open: lastC.close, close: price, high: price, low: price});
        } else {
            lastC.close = price;
            lastC.high = Math.max(lastC.high, price);
            lastC.low = Math.min(lastC.low, price);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        
        // 计算价格区间并增加 30% 的上下边距
        const prices = candles.flatMap(c => [c.high, c.low]);
        const maxP = Math.max(...prices);
        const minP = Math.min(...prices);
        const diff = maxP - minP;
        const viewMax = maxP + diff * 0.3; // 关键：增加顶部空间
        const viewMin = minP - diff * 0.3; // 关键：增加底部空间
        
        const getY = (p) => h - ((p - viewMin) / (viewMax - viewMin)) * h;
        const cW = w / MAX_VISIBLE;

        // 绘制网格线
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for(let i=1; i<5; i++) {
            let gy = (h / 5) * i;
            ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
        }

        // 绘制 K 线
        candles.forEach((c, i) => {
            const x = i * cW;
            const yO = getY(c.open);
            const yC = getY(c.close);
            const color = c.close >= c.open ? "#00c087" : "#ff3b5b";
            
            ctx.strokeStyle = ctx.fillStyle = color;
            // 影线
            ctx.beginPath();
            ctx.moveTo(x + cW/2, getY(c.high));
            ctx.lineTo(x + cW/2, getY(c.low));
            ctx.stroke();
            // 实体
            const bodyH = Math.max(Math.abs(yO - yC), 1);
            ctx.fillRect(x + 1, Math.min(yO, yC), cW - 2, bodyH);
        });

        // 绘制当前价格横线
        const curY = getY(lastPrice);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = lastPrice >= candles[candles.length-1].open ? "#00c087" : "#ff3b5b";
        ctx.beginPath(); ctx.moveTo(0, curY); ctx.lineTo(w, curY); ctx.stroke();
        ctx.setLineDash([]);

        // 模拟博弈漂移
        if(isUserTrading) {
            let move = (Math.random() * 2) * (window._dir === 'up' ? 1 : -1);
            updateLogic(lastPrice + move);
        }

        requestAnimationFrame(render);
    }

    function setLev(btn, val) {
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        leverage = val;
    }

    function executeTrade(dir) {
        if(isUserTrading) return;
        isUserTrading = true;
        window._dir = dir;
        setTimeout(() => {
            const pnl = (Math.random() * 5 + 2) * leverage;
            document.getElementById('pnl-display').innerText = `+${pnl.toFixed(2)}%`;
            document.getElementById('result-modal').style.display = 'flex';
        }, 4000);
    }

    window.onload = init;
</script>
</body>
</html>
